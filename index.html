<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK Group - Universe Multi-Language</title>
    <style>
        /* 기본 배경 설정 */
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-family: 'Pretendard', sans-serif;
        }

        /* 우측 상단 언어 선택 박스 */
        .language-selector {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 10;
        }

        select {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 8px 15px;
            border-radius: 4px;
            backdrop-filter: blur(5px);
            cursor: pointer;
            outline: none;
            font-size: 0.9rem;
        }

        select option {
            background: #1B2735;
            color: white;
        }

        /* 별과 오로라 애니메이션 */
        .stars { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.5; animation: twinkle var(--duration) infinite ease-in-out; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.2); } }
        .aurora { position: absolute; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, rgba(0, 255, 255, 0.05), transparent 50%); filter: blur(50px); z-index: 0; }

        /* 중앙 콘텐츠 */
        .content {
            position: relative;
            z-index: 1;
            text-align: center;
            transition: all 0.5s ease;
        }

        h1 {
            font-size: 3.5rem;
            letter-spacing: 8px;
            margin-bottom: 10px;
            background: linear-gradient(to right, #fff, #4dafff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p { font-size: 1.2rem; opacity: 0.8; letter-spacing: 2px; height: 1.5rem; }
    </style>
</head>
<body>

    <div class="aurora"></div>
    <div class="stars" id="starField"></div>

    <div class="language-selector">
        <select id="langSelect" onchange="changeLanguage()">
            <option value="ko">한국어</option>
            <option value="en">English</option>
            <option value="zh">中国语</option>
            <option value="ar">العربية</option>
            <option value="hi">हिन्दी</option>
            <option value="es">Español</option>
            <option value="pt">Português</option>
            <option value="uk">Українська</option>
            <option value="ja">日本語</option>
            <option value="ru">Русский</option>
            <option value="vi">Tiếng Việt</option>
            <option value="th">ไทย</option>
            <option value="id">Bahasa Indonesia</option>
        </select>
    </div>

    <div class="content">
        <h1>HK GROUP</h1>
        <p id="subText">지구를 넘어, 미래를 향해</p>
    </div>

    <script>
        // 언어별 데이터
        const translations = {
            ko: "지구를 넘어, 미래를 향해",
            en: "Beyond the Earth, Towards the Future",
            zh: "超越地球，走向未来",
            ar: "ما وراء الأرض، نحو المستقبل",
            hi: "पृथ्वी से परे, भविष्य की ओर",
            es: "Más allá de la Tierra, hacia el futuro",
            pt: "Além da Terra, em direção ao futuro",
            uk: "За межі Землі, назустріч майбутньому",
            ja: "地球を超えて、未来へ",
            ru: "За пределами Земли, навстречу будущему",
            vi: "Vươn xa khỏi Trái Đất, hướng tới tương lai",
            th: "เหนือกว่าโลก สู่ 미래",
            id: "Melampaui Bumi, Menuju Masa Depan"
        };

        function changeLanguage() {
            const select = document.getElementById('langSelect');
            const subText = document.getElementById('subText');
            subText.style.opacity = 0; // 페이드 아웃 효과
            
            setTimeout(() => {
                subText.innerText = translations[select.value];
                subText.style.opacity = 0.8; // 페이드 인 효과
            }, 300);
        }

        // 별 생성 스크립트
        const starField = document.getElementById('starField');
        for (let i = 0; i < 150; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 3 + 'px';
            star.style.width = size; star.style.height = size;
            star.style.top = Math.random() * 100 + '%';
            star.style.left = Math.random() * 100 + '%';
            star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
            starField.appendChild(star);
        }
    </script>
</body>
</html>
