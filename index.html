<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK-SPACE | 인류의 새로운 태양</title>
    <style>
        :root {
            --neon-orange: #ff6600;
            --bg-deep: #00040a;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-deep);
            color: #fff;
            font-family: 'Inter', -apple-system, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* 우주 배경 효과 */
        .stars-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #10182b 0%, #00040a 100%);
            z-index: -1;
        }

        /* 우측 상단 언어 바 (초슬림 디자인) */
        .lang-bar {
            position: fixed;
            top: 30px;
            right: 30px;
            display: flex;
            gap: 15px;
            z-index: 100;
        }

        .lang-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.7rem;
            letter-spacing: 1px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s;
            padding: 0;
        }

        .lang-btn:hover, .lang-btn.active {
            color: var(--neon-orange);
            text-shadow: 0 0 10px var(--neon-orange);
        }

        /* 메인 센터 콘텐츠 */
        .hero {
            text-align: center;
            z-index: 10;
        }

        .brand {
            font-size: clamp(4rem, 15vw, 10rem);
            font-weight: 900;
            color: var(--neon-orange);
            text-shadow: 0 0 30px rgba(255, 102, 0, 0.5);
            margin: 0;
            letter-spacing: -2px;
            line-height: 0.9;
            animation: pulse 3s infinite alternate;
        }

        .slogan-main {
            font-size: clamp(1.2rem, 3vw, 2.5rem);
            font-weight: 200;
            margin-top: 20px;
            letter-spacing: 5px;
            color: #f0f0f0;
            opacity: 0.8;
        }

        /* 하단 고객 성공 문구 */
        .footer-zone {
            position: absolute;
            bottom: 50px;
            text-align: center;
            width: 100%;
        }

        .success-text {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--neon-orange);
            letter-spacing: 10px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .email {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.3);
            text-decoration: none;
            letter-spacing: 1px;
        }

        @keyframes pulse {
            from { transform: scale(1); text-shadow: 0 0 30px rgba(255, 102, 0, 0.5); }
            to { transform: scale(1.02); text-shadow: 0 0 60px rgba(255, 102, 0, 0.8), 0 0 10px #fff; }
        }
    </style>
</head>
<body>

    <div class="stars-container"></div>

    <nav class="lang-bar">
        <button class="lang-btn active" onclick="change('ko')">KR</button>
        <button class="lang-btn" onclick="change('en')">EN</button>
        <button class="lang-btn" onclick="change('zh')">CN</button>
        <button class="lang-btn" onclick="change('ar')">AR</button>
        <button class="lang-btn" onclick="change('ru')">RU</button>
        <button class="lang-btn" onclick="change('fr')">FR</button>
        <button class="lang-btn" onclick="change('ja')">JP</button>
        <button class="lang-btn" onclick="change('es')">ES</button>
    </nav>

    <div class="hero">
        <h1 class="brand">HK-SPACE</h1>
        <p id="slogan" class="slogan-main">인류의 영원한 태양을 우주에 띄우다</p>
    </div>

    <div class="footer-zone">
        <div id="target" class="success-text">고객의 성공을 위하여</div>
        <a href="mailto:info@space.com" class="email">info@space.com</a>
    </div>

    <script>
        const dict = {
            'ko': { s: '인류의 영원한 태양을 우주에 띄우다', t: '고객의 성공을 위하여' },
            'en': { s: "LAUNCHING THE ETERNAL SUN", t: 'FOR CUSTOMER SUCCESS' },
            'zh': { s: '将人类永恒的太阳升入太空', t: '助力客户成功' },
            'ar': { s: 'إطلاق الشمس الأبدية في الفضاء', t: 'من أجل نجاح العملاء' },
            'ru': { s: 'ЗАПУСК ВЕЧНОГО СОЛНЦА В КОСМОС', t: 'РАДИ УСПЕХА КЛИЕНТОВ' },
            'fr': { s: 'LANCER LE SOLEIL ÉTERNEL', t: 'POUR LE SUCCÈS DU CLIENT' },
            'ja': { s: '人類の永遠の太陽を宇宙に浮かべる', t: '顧客の成功のために' },
            'es': { s: 'LANZANDO EL SOL ETERNO AL ESPACIO', t: 'POR EL ÉXITO DEL CLIENTE' }
        };

        function change(lang) {
            document.getElementById('slogan').innerText = dict[lang].s;
            document.getElementById('target').innerText = dict[lang].t;
            
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText.toLowerCase() === lang);
            });
        }
    </script>
</body>
</html>
