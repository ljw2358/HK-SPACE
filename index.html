<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK-SPACE INDUSTRY | 글로벌 우주 산업의 리더</title>
    <style>
        :root {
            --neon-orange: #ff6600;
            --deep-dark: #000308;
            --glass: rgba(255, 102, 0, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--deep-dark);
            color: #fff;
            font-family: 'Pretendard', sans-serif;
            overflow-x: hidden;
            line-height: 1.7;
        }

        /* 우주 배경 애니메이션 */
        .space-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #0d1b2a 0%, #000308 100%);
            z-index: -1;
        }

        /* 오른쪽 상단 언어 선택 네모 박스 */
        .lang-container {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--neon-orange);
            padding: 10px;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .lang-btn {
            background: var(--glass);
            border: 1px solid rgba(255, 102, 0, 0.3);
            color: var(--neon-orange);
            padding: 4px 8px;
            font-size: 0.65rem;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
        }

        .lang-btn:hover, .lang-btn.active {
            background: var(--neon-orange);
            color: #fff;
        }

        /* 메인 콘텐츠 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 150px 20px 80px;
            text-align: center;
        }

        .brand-logo {
            font-size: clamp(2.5rem, 10vw, 6rem);
            font-weight: 900;
            color: var(--neon-orange);
            text-shadow: 0 0 20px rgba(255, 102, 0, 0.5);
            margin: 0;
            letter-spacing: -1px;
        }

        .industry-tag {
            font-size: 1.2rem;
            letter-spacing: 8px;
            color: #aaa;
            margin-top: -10px;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        .main-slogan {
            font-size: clamp(1.2rem, 3vw, 2.5rem);
            font-weight: 300;
            color: #f0f0f0;
            margin-bottom: 80px;
        }

        /* 내용 충실히 (그리드 레이아웃) */
        .grid-box {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            text-align: left;
        }

        .info-card {
            background: rgba(255, 255, 255, 0.03);
            border-left: 4px solid var(--neon-orange);
            padding: 30px;
            transition: 0.3s;
        }

        .info-card:hover {
            background: rgba(255, 102, 0, 0.05);
            transform: translateY(-5px);
        }

        .info-card h3 {
            color: var(--neon-orange);
            margin-top: 0;
            font-size: 1.5rem;
        }

        .info-card p {
            color: #ccc;
            margin-bottom: 0;
        }

        /* 푸터 */
        .footer {
            margin-top: 100px;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 40px 0;
        }

        .success-msg {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--neon-orange);
            letter-spacing: 5px;
            margin-bottom: 20px;
        }

        .contact-mail {
            color: #777;
            text-decoration: none;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .lang-container { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>
<body>

    <div class="space-bg"></div>

    <div class="lang-container">
        <button class="lang-btn active" onclick="update('ko', this)">한국어</button>
        <button class="lang-btn" onclick="update('en', this)">EN</button>
        <button class="lang-btn" onclick="update('zh', this)">CN</button>
        <button class="lang-btn" onclick="update('ar', this)">AR</button>
        <button class="lang-btn" onclick="update('hi', this)">HI</button>
        <button class="lang-btn" onclick="update('es', this)">ES</button>
        <button class="lang-btn" onclick="update('pt', this)">BR</button>
        <button class="lang-btn" onclick="update('uk', this)">UA</button>
        <button class="lang-btn" onclick="update('ja', this)">JP</button>
        <button class="lang-btn" onclick="update('ru', this)">RU</button>
    </div>

    <div class="container">
        <h1 class="brand-logo">HK-SPACE</h1>
        <div class="industry-tag">INDUSTRY</div>
        <p id="slogan" class="main-slogan">인류의 영원한 태양을 우주에 띄우다</p>

        <div class="grid-box">
            <div class="info-card">
                <h3 id="h1">우주 핵융합 에너지</h3>
                <p id="p1">지구와 우주 어디서나 사용 가능한 무한 에너지를 실현하여 차세대 에너지 주권을 확보합니다.</p>
            </div>
            <div class="info-card">
                <h3 id="h2">미래 산업 융합</h3>
                <p id="p2">로봇, AI, 항공우주 기술을 통합하여 달과 화성 개척을 위한 핵심 인프라를 구축합니다.</p>
            </div>
            <div class="info-card">
                <h3 id="h3">지속 가능한 비전</h3>
                <p id="p3">탈탄소 에너지 혁명을 통해 지구를 보호하고 인류 문명의 활동 영역을 우주로 확장합니다.</p>
            </div>
        </div>

        <footer class="footer">
            <div id="target" class="success-msg">고객의 성공을 위하여</div>
            <a href="mailto:info@hkspace.com" class="contact-mail">info@hkspace.com</a>
        </footer>
    </div>

    <script>
        const content = {
            'ko': {
                s: '인류의 영원한 태양을 우주에 띄우다', t: '고객의 성공을 위하여',
                h1: '우주 핵융합 에너지', p1: '지구와 우주 어디서나 사용 가능한 무한 에너지를 실현하여 차세대 에너지 주권을 확보합니다.',
                h2: '미래 산업 융합', p2: '로봇, AI, 항공우주 기술을 통합하여 달과 화성 개척을 위한 핵심 인프라를 구축합니다.',
                h3: '지속 가능한 비전', p3: '탈탄소 에너지 혁명을 통해 지구를 보호하고 인류 문명의 활동 영역을 우주로 확장합니다.'
            },
            'en': {
                s: "LAUNCHING THE ETERNAL SUN", t: 'FOR CUSTOMER SUCCESS',
                h1: 'Space Fusion Energy', p1: 'Realizing infinite energy available anywhere in Earth and space for next-gen sovereignty.',
                h2: 'Future Convergence', p2: 'Integrating robotics, AI, and aerospace to build key infrastructure for lunar and Mars exploration.',
                h3: 'Sustainable Vision', p3: 'Protecting Earth through a decarbonized energy revolution and expanding humanity into space.'
            }
            // ... 형님, 요청하신 나머지 언어도 이 구조에 맞춰 추가 가능합니다!
        };

        function update(lang, btn) {
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            const d = content[lang] || content['en'];
            document.getElementById('slogan').innerText = d.s;
            document.getElementById('target').innerText = d.t;
            document.getElementById('h1').innerText = d.h1;
            document.getElementById('p1').innerText = d.p1;
            document.getElementById('h2').innerText = d.h2;
            document.getElementById('p2').innerText = d.p2;
            document.getElementById('h3').innerText = d.h3;
            document.getElementById('p3').innerText = d.p3;
        }
    </script>
</body>
</html>
