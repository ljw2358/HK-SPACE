<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK-SPACE</title>
    <style>
        :root {
            --neon-orange: #ff6600;
            --dark-bg: #000814;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--dark-bg);
            color: #fff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* 우측 상단 언어 선택 (홀로그램 스타일) */
        .language-nav {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-end;
            gap: 8px;
            max-width: 700px;
            z-index: 100;
        }

        .lang-btn {
            background: rgba(255, 102, 0, 0.1);
            border: 1px solid var(--neon-orange);
            color: var(--neon-orange);
            padding: 5px 12px;
            font-size: 0.75rem;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: 0 0 5px rgba(255, 102, 0, 0.3);
        }

        .lang-btn:hover {
            background: var(--neon-orange);
            color: white;
            box-shadow: 0 0 15px var(--neon-orange);
        }

        /* 메인 콘텐츠 */
        .main-container {
            text-align: center;
            perspective: 1000px;
        }

        .brand-name {
            font-size: clamp(3rem, 10vw, 7rem);
            font-weight: 900;
            color: var(--neon-orange);
            text-shadow: 0 0 15px var(--neon-orange), 0 0 30px var(--neon-orange);
            margin-bottom: 30px;
            letter-spacing: 10px;
            animation: float 4s ease-in-out infinite;
        }

        .slogan-box {
            min-height: 120px;
            margin-bottom: 40px;
        }

        .slogan {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 300;
            opacity: 0.9;
            color: #e0e0e0;
            margin-bottom: 15px;
        }

        .target {
            font-size: clamp(1rem, 3vw, 1.5rem);
            letter-spacing: 2px;
            color: var(--neon-orange);
            font-weight: bold;
        }

        /* 이메일 정보 */
        .contact {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.4);
        }

        .contact a {
            color: var(--neon-orange);
            text-decoration: none;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotateX(5deg); }
            50% { transform: translateY(-20px) rotateX(-5deg); }
        }

        /* 배경 우주 효과 */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            z-index: -1;
        }
    </style>
</head>
<body>

    <div class="stars"></div>

    <nav class="language-nav">
        <button class="lang-btn" onclick="updateLang('ko')">한국어</button>
        <button class="lang-btn" onclick="updateLang('en')">English</button>
        <button class="lang-btn" onclick="updateLang('zh')">Chinese</button>
        <button class="lang-btn" onclick="updateLang('ar')">Arabic</button>
        <button class="lang-btn" onclick="updateLang('hi')">Hindi</button>
        <button class="lang-btn" onclick="updateLang('ru')">Russian</button>
        <button class="lang-btn" onclick="updateLang('fr')">French</button>
        <button class="lang-btn" onclick="updateLang('uk')">Ukraine</button>
        <button class="lang-btn" onclick="updateLang('ja')">Japanese</button>
        <button class="lang-btn" onclick="updateLang('es')">Spanish</button>
        <button class="lang-btn" onclick="updateLang('pt')">Brazil</button>
    </nav>

    <div class="main-container">
        <h1 class="brand-name">HK-SPACE</h1>
        <div class="slogan-box">
            <div id="main-slogan" class="slogan">인류의 영원한 태양을 우주에 띄우다</div>
            <div id="sub-slogan" class="target">고객의 성공을 위하여</div>
        </div>
    </div>

    <div class="contact">
        Contact: <a href="mailto:info@space.com">info@space.com</a>
    </div>

    <script>
        const content = {
            'ko': { s: '인류의 영원한 태양을 우주에 띄우다', t: '고객의 성공을 위하여' },
            'en': { s: "Launching Humanity's Eternal Sun into Space", t: 'For Customer Success' },
            'zh': { s: '将人类永恒的太阳升入太空', t: '助力客户成功' },
            'ar': { s: 'إطلاق شمس البشرية الأبدية في الفضاء', t: 'من أجل نجاح العملاء' },
            'hi': { s: 'मानवता के शाश्वत सूर्य को अंतरिक्ष में प्रक्षेपित करना', t: 'ग्राहकों की सफलता के लिए' },
            'ru': { s: 'Запуск вечного солнца человечества в космос', t: 'Ради успеха клиентов' },
            'fr': { s: "Lancer le soleil éternel de l'humanité dans l'espace", t: 'Pour le succès du client' },
            'uk': { s: 'Запуск вічного сонця людства в космос', t: 'Заради успіху клієнтів' },
            'ja': { s: '人類の永遠의 太陽을 宇宙에 띄우다', t: '顧客의 成功을 위하여' },
            'es': { s: 'Lanzando el sol eterno de la humanidad al espacio', t: 'Por el éxito del cliente' },
            'pt': { s: 'Lançando o sol eterno da humanidade no espaço', t: 'Pelo sucesso do cliente' }
        };

        function updateLang(lang) {
            const slogan = document.getElementById('main-slogan');
            const target = document.getElementById('sub-slogan');
            
            // 페이드 효과를 위해 잠시 투명하게
            slogan.style.opacity = 0;
            target.style.opacity = 0;

            setTimeout(() => {
                slogan.innerText = content[lang].s;
                target.innerText = content[lang].t;
                slogan.style.opacity = 1;
                target.style.opacity = 1;
            }, 200);
        }
    </script>
</body>
</html>
